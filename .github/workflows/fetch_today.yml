name: Fetch Vietlott Results

on:
  schedule:
    # Giờ VN = UTC+7. Tất cả cron dùng UTC.
    # 535 xổ 13:00 VN → chạy lúc 13:15 VN = 06:15 UTC
    - cron: '15 6 * * *'
    # 535 xổ 21:00 VN → chạy lúc 21:15 VN = 14:15 UTC
    - cron: '15 14 * * *'
    # 645/655 xổ 18:05 VN → chạy lúc 18:20 VN = 11:20 UTC
    - cron: '20 11 * * *'
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pytz

      - name: Fetch today's results
        run: python scripts/fetch_today.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          git diff --staged --quiet || git commit -m "chore: update today results $(date +'%Y-%m-%d %H:%M') UTC"
          git push
